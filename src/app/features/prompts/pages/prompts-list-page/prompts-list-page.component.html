<app-page-header
  title="Prompts"
  subtitle="Bibliothèque de prompts IA organisés par catégorie."
/>

<div class="category-filters">
  <button
    class="category-filter"
    [class.category-filter--active]="selectedCategory() === 'all'"
    (click)="selectCategory('all')"
  >
    Tous
  </button>
  @for (category of categories(); track category) {
    <button
      class="category-filter"
      [class.category-filter--active]="selectedCategory() === category"
      (click)="selectCategory(category)"
    >
      {{ category }}
    </button>
  }
</div>

<app-tag-filter
  [tags]="promptTags()"
  [selectedTags]="selectedTags()"
  (tagToggle)="onTagToggle($event)"
  (clearAll)="onClearTags()"
/>

@if (filteredPrompts().length === 0) {
  <app-empty-state
    icon="auto_awesome"
    title="Aucun prompt"
    message="Aucun prompt ne correspond aux filtres sélectionnés."
  />
} @else {
  <div class="prompts-grid">
    @for (prompt of filteredPrompts(); track prompt.id) {
      <app-prompt-card [prompt]="prompt" />
    }
  </div>
}
